name: Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: pip install blessed pycryptodome

      - name: Syntax check nerv.py
        run: python -m py_compile nerv.py && echo 'nerv.py OK'

      - name: Syntax check run.py
        run: python -m py_compile run.py && echo 'run.py OK'
